<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aetherium Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #282828;
      --surface: #3c3836;
      --surface-border: #504945;
      --text: #ebdbb2;
      --text-secondary: #a89984;
      --text-muted: #504945;
      --primary: #fabd2f;
      --primary-hover: #f2cc6f;
      --accent: #b8bb26;
      --error: #fb4934;
      --error-bg: #fb493414;
      --input-bg: #282828;
      --input-border: #504945;
      --input-focus: #fabd2f;
      --tag-bg: #3c3836;
      --tag-text: #504945;
      --link: #fabd2f;
      --divider: #3c3836;
      --placeholder: #504945;
      --shadow: #00000050;
    }

    body {
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      transition: background 0.3s, color 0.3s;
    }

    .home {
      text-align: center;
      width: 70%;
      max-width: 900px;
    }

    .home h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
    }

    .home h1 span {
      color: var(--primary);
    }

    .home form {
      position: relative;
    }

    .home input {
      width: 100%;
      padding: 14px 48px 14px 18px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 16px;
      outline: none;
      font-family: inherit;
    }

    .home input:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--input-focus) 15%, transparent);
    }

    .home input::placeholder {
      color: var(--placeholder);
    }

    .home button {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .home button:hover {
      color: var(--text);
      background: var(--surface-border);
    }

    .theme-toggle {
      margin-top: 24px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid var(--surface-border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
    }

    .theme-toggle:hover {
      color: var(--text-secondary);
    }

    .theme-dropdown {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 8px;
      padding: 8px;
      gap: 8px;
      box-shadow: 0 4px 16px var(--shadow);
    }

    .theme-dropdown.open {
      display: flex;
    }

    .theme-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
    }

    .theme-dot:hover { transform: scale(1.15); }
    .theme-dot.active { border-color: var(--primary); }
    .theme-dot[data-theme="gruvbox"] { background: #282828; border: 1px solid #504945; }
    .theme-dot[data-theme="tokyonight"] { background: #1a1b26; border: 1px solid #414868; }
  </style>
  <script>
    (function() {
      var themes = {
        gruvbox: { background: "#282828", surface: "#3c3836", surfaceBorder: "#504945", text: "#ebdbb2", textSecondary: "#a89984", textMuted: "#504945", primary: "#fabd2f", primaryHover: "#f2cc6f", accent: "#b8bb26", error: "#fb4934", errorBg: "#fb493414", inputBg: "#282828", inputBorder: "#504945", inputFocus: "#fabd2f", tagBg: "#3c3836", tagText: "#504945", link: "#fabd2f", divider: "#3c3836", placeholder: "#504945", shadow: "#00000050" },
        tokyonight: { background: "#1a1b26", surface: "#24283b", surfaceBorder: "#414868", text: "#c0caf5", textSecondary: "#a9b1d6", textMuted: "#414868", primary: "#7aa2f7", primaryHover: "#9aa5e1", accent: "#9ece6a", error: "#f7768e", errorBg: "#f7768e14", inputBg: "#1a1b26", inputBorder: "#414868", inputFocus: "#7aa2f7", tagBg: "#24283b", tagText: "#414868", link: "#7aa2f7", divider: "#24283b", placeholder: "#414868", shadow: "#00000045" }
      };

      function getCookie(name) {
        var cookies = document.cookie.split("; ");
        for (var c of cookies) {
          var parts = c.split("=");
          var key = parts[0];
          var val = parts.slice(1).join("=");
          if (key === name) return val;
        }
        return null;
      }

      function setCookie(name, value) {
        document.cookie = name + "=" + value + "; path=/; max-age=31536000";
      }

      function applyTheme(name) {
        var colors = themes[name] || themes.gruvbox;
        var vars = [
          "--bg: "+colors.background,
          "--surface: "+colors.surface,
          "--surface-border: "+colors.surfaceBorder,
          "--text: "+colors.text,
          "--text-secondary: "+colors.textSecondary,
          "--text-muted: "+colors.textMuted,
          "--primary: "+colors.primary,
          "--primary-hover: "+colors.primaryHover,
          "--accent: "+colors.accent,
          "--error: "+colors.error,
          "--error-bg: "+colors.errorBg,
          "--input-bg: "+colors.inputBg,
          "--input-border: "+colors.inputBorder,
          "--input-focus: "+colors.inputFocus,
          "--tag-bg: "+colors.tagBg,
          "--tag-text: "+colors.tagText,
          "--link: "+colors.link,
          "--divider: "+colors.divider,
          "--placeholder: "+colors.placeholder,
          "--shadow: "+colors.shadow
        ].join("; ");
        document.body.style.cssText = vars;
        setCookie("aetherium-theme", name);
        updateDots(name);
      }

      function updateDots(name) {
        document.querySelectorAll(".theme-dot").forEach(function(el) {
          el.classList.toggle("active", el.getAttribute("data-theme") === name);
        });
      }

      window.addEventListener("load", function() {
        var stored = getCookie("aetherium-theme") || "gruvbox";
        applyTheme(stored);

        var btn = document.getElementById("theme-btn");
        var dropdown = document.getElementById("theme-dropdown");

        btn.addEventListener("click", function() {
          dropdown.classList.toggle("open");
        });

        document.querySelectorAll(".theme-dot").forEach(function(dot) {
          dot.addEventListener("click", function() {
            applyTheme(dot.getAttribute("data-theme"));
            dropdown.classList.remove("open");
          });
        });

        document.addEventListener("click", function(e) {
          if (!e.target.closest(".theme-toggle")) {
            dropdown.classList.remove("open");
          }
        });
      });
    })();
  </script>
</head>
<body>
  <div class="home">
    <h1><span>Aetherium</span> Search</h1>
    <form action="/search" method="GET">
      <input type="search" name="q" placeholder="Search the web..." autofocus>
      <button type="submit">&#8594;</button>
    </form>
    <div class="theme-toggle" id="theme-btn">
      <span>&#9881;</span> Theme
      <div class="theme-dropdown" id="theme-dropdown">
        <div class="theme-dot" data-theme="gruvbox" title="Gruvbox"></div>
        <div class="theme-dot" data-theme="tokyonight" title="Tokyo Night"></div>
      </div>
    </div>
  </div>
</body>
</html>
